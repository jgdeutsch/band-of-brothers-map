<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band of Brothers - Easy Company Route Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Special+Elite&family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Special Elite', 'Courier New', monospace;
    background: #0a0a0a;
    color: #e8e4dc;
    overflow: hidden;
    height: 100vh;
  }

  #map {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
    background: #1a1a1a;
  }

  /* Map tiles - use voyager base darkened, not dark_all which is too dark */
  #map .main-tiles { filter: brightness(0.45) saturate(0.4) contrast(1.3); }
  #map .label-tiles { opacity: 1; }

  /* Fade in tiles instead of popping */
  .leaflet-tile {
    opacity: 0;
    transition: opacity 0.3s ease-in;
  }
  .leaflet-tile-loaded {
    opacity: 1;
  }

  /* Keep tiles visible during zoom to prevent white flash */
  .leaflet-fade-anim .leaflet-tile,
  .leaflet-fade-anim .leaflet-popup {
    transition: opacity 0.3s ease-in;
  }
  .leaflet-zoom-anim .leaflet-tile {
    transition: none;
  }
  .leaflet-control-zoom { display: none; }

  /* Top bar */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.7) 80%, transparent 100%);
    padding: 16px 24px 32px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  #topbar-left h1 {
    font-family: 'EB Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    color: #c9a96e;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #topbar-left .subtitle {
    font-size: 11px;
    color: #888;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  #episode-nav {
    display: flex;
    gap: 2px;
    align-items: center;
  }

  .ep-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid #333;
    background: transparent;
    color: #666;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }
  .ep-dot:hover { border-color: #c9a96e; color: #c9a96e; }
  .ep-dot.active {
    border-color: #c9a96e;
    background: #c9a96e;
    color: #0a0a0a;
  }
  .ep-dot.visited {
    border-color: #555;
    background: #333;
    color: #aaa;
  }

  /* Bottom panel */
  #panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 1000;
    background: linear-gradient(0deg, rgba(10,10,10,0.97) 0%, rgba(10,10,10,0.92) 70%, rgba(10,10,10,0.6) 90%, transparent 100%);
    padding: 40px 0 24px;
    max-height: 52vh;
    overflow: hidden;
  }

  #panel-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 32px;
    overflow-y: auto;
    max-height: calc(52vh - 64px);
  }

  #panel-inner::-webkit-scrollbar { width: 4px; }
  #panel-inner::-webkit-scrollbar-track { background: transparent; }
  #panel-inner::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .location-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 4px;
  }

  .location-number {
    font-family: 'EB Garamond', serif;
    font-size: 48px;
    font-weight: 700;
    color: #c9a96e;
    line-height: 1;
    min-width: 50px;
  }

  .location-title {
    font-family: 'EB Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: #fff;
    line-height: 1.2;
  }

  .episode-badge {
    display: inline-block;
    background: rgba(201,169,110,0.15);
    color: #c9a96e;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 3px;
    margin-bottom: 8px;
  }

  .date-badge {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
  }

  .transport-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(201,169,110,0.08);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 4px;
    padding: 4px 10px;
    margin-bottom: 14px;
  }
  .transport-badge svg {
    width: 18px;
    height: 18px;
    fill: #c9a96e;
    flex-shrink: 0;
  }
  .transport-badge .transport-label {
    font-size: 11px;
    font-weight: 600;
    color: #c9a96e;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .location-summary {
    font-size: 14px;
    line-height: 1.7;
    color: #bbb;
    margin-bottom: 14px;
    font-style: italic;
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 15px;
  }

  .events-list {
    list-style: none;
    margin-bottom: 14px;
  }
  .events-list li {
    font-size: 13px;
    line-height: 1.6;
    color: #ccc;
    padding: 3px 0 3px 16px;
    position: relative;
  }
  .events-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 11px;
    width: 6px;
    height: 6px;
    background: #c9a96e;
    border-radius: 50%;
  }

  .characters-section {
    margin-bottom: 12px;
  }
  .characters-section h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #666;
    margin-bottom: 6px;
  }
  .character-tag {
    display: inline-block;
    background: rgba(255,255,255,0.06);
    border: 1px solid #333;
    border-radius: 3px;
    padding: 2px 8px;
    font-size: 11px;
    color: #aaa;
    margin: 2px 4px 2px 0;
  }

  .landmarks-section {
    margin-bottom: 12px;
  }
  .landmarks-section h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #666;
    margin-bottom: 6px;
  }
  .landmark-item {
    font-size: 12px;
    color: #999;
    padding: 2px 0;
  }
  .landmark-item .lm-name { color: #c9a96e; }

  .wiki-link {
    display: inline-block;
    color: #6b9bd2;
    font-size: 12px;
    text-decoration: none;
    border-bottom: 1px dotted #6b9bd2;
    margin-top: 4px;
  }
  .wiki-link:hover { color: #8bb8ef; }

  .historical-note {
    background: rgba(201,169,110,0.08);
    border-left: 3px solid #c9a96e;
    padding: 8px 12px;
    margin: 10px 0;
    font-size: 12px;
    color: #bbb;
    line-height: 1.5;
  }

  /* Navigation arrows */
  #nav-arrows {
    position: fixed;
    bottom: 20px;
    right: 24px;
    z-index: 1001;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid #444;
    background: rgba(10,10,10,0.9);
    color: #aaa;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: #c9a96e; color: #c9a96e; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { border-color: #444; color: #aaa; }

  .nav-counter {
    font-size: 11px;
    color: #666;
    font-weight: 600;
    letter-spacing: 1px;
    min-width: 50px;
    text-align: center;
  }

  /* Keyboard hint */
  #kbd-hint {
    position: fixed;
    bottom: 72px;
    right: 24px;
    z-index: 1001;
    font-size: 10px;
    color: #444;
    text-align: right;
  }
  kbd {
    display: inline-block;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 3px;
    padding: 1px 5px;
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 10px;
    color: #666;
  }

  /* Sub-location dots */
  .sub-nav {
    display: flex;
    gap: 6px;
    margin: 8px 0 12px;
    align-items: center;
  }
  .sub-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sub-dot.active { background: #c9a96e; width: 24px; border-radius: 4px; }
  .sub-dot:hover { background: #666; }

  /* Route line pulse */
  @keyframes pulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }

  /* Custom markers */
  .custom-marker {
    background: none;
    border: none;
  }
  .marker-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid #c9a96e;
    background: rgba(201,169,110,0.3);
    transition: all 0.3s;
  }
  .marker-dot.active {
    width: 20px;
    height: 20px;
    background: #c9a96e;
    box-shadow: 0 0 20px rgba(201,169,110,0.5);
  }
  .marker-dot.visited {
    border-color: #666;
    background: rgba(102,102,102,0.3);
  }
  .marker-dot.future {
    border-color: #333;
    background: transparent;
  }

  /* Transport tooltip (moves with the icon) */
  .transport-tooltip {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    pointer-events: none;
    white-space: nowrap;
    opacity: 0;
    animation: ttFadeIn 0.3s ease-out 0.2s forwards;
  }
  .transport-tooltip .tt-dist {
    background: rgba(10,10,10,0.9);
    border: 1px solid rgba(201,169,110,0.5);
    border-radius: 3px;
    padding: 2px 8px;
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 11px;
    font-weight: 700;
    color: #c9a96e;
    letter-spacing: 0.5px;
  }
  .transport-tooltip .tt-time {
    background: rgba(10,10,10,0.8);
    border-radius: 2px;
    padding: 1px 6px;
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 9px;
    font-weight: 500;
    color: #aaa;
    letter-spacing: 0.3px;
  }
  @keyframes ttFadeIn {
    0% { opacity: 0; transform: translateX(-50%) translateY(4px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Animated transport icon on map */
  .transport-mover {
    background: none !important;
    border: none !important;
  }
  .transport-mover-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 0 8px rgba(201,169,110,0.6));
    transition: transform 0.1s linear;
    position: relative;
  }
  .transport-mover-inner svg {
    width: 32px;
    height: 32px;
    fill: #c9a96e;
  }

  /* Parachute drop animation */
  @keyframes parachute-drop {
    0% { transform: translateY(-60px) scale(0.5); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  .transport-mover-inner.anim-parachute {
    animation: parachute-drop 2s ease-out forwards;
  }
  .transport-mover-inner.anim-parachute svg {
    width: 36px;
    height: 36px;
  }

  /* Ship bob */
  @keyframes ship-bob {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  .transport-mover-inner.moving-ship svg {
    animation: ship-bob 0.8s ease-in-out infinite;
  }

  /* Walking bounce */
  @keyframes walk-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  .transport-mover-inner.moving-on_foot svg {
    animation: walk-bounce 0.35s ease-in-out infinite;
  }

  /* Truck rumble */
  @keyframes truck-rumble {
    0%, 100% { transform: translateY(0); }
    25% { transform: translateY(-1.5px); }
    75% { transform: translateY(1px); }
  }
  .transport-mover-inner.moving-truck svg {
    animation: truck-rumble 0.25s ease-in-out infinite;
  }

  /* Jeep bounce */
  @keyframes jeep-bounce {
    0%, 100% { transform: translateY(0) rotate(0); }
    30% { transform: translateY(-2px) rotate(1deg); }
    70% { transform: translateY(1px) rotate(-0.5deg); }
  }
  .transport-mover-inner.moving-jeep svg {
    animation: jeep-bounce 0.4s ease-in-out infinite;
  }

  /* Airplane fly */
  @keyframes plane-tilt {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }
  .transport-mover-inner.moving-airplane svg {
    animation: plane-tilt 1.5s ease-in-out infinite;
    width: 38px;
    height: 38px;
  }

  /* Intro overlay */
  #intro {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 2000;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 1s ease;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }
  #intro h1 {
    font-family: 'EB Garamond', serif;
    font-size: 42px;
    font-weight: 700;
    color: #c9a96e;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #intro h2 {
    font-family: 'EB Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: #888;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  #intro .unit {
    font-size: 12px;
    color: #555;
    letter-spacing: 1px;
    margin-bottom: 40px;
  }
  #intro .start-btn {
    background: transparent;
    border: 1px solid #c9a96e;
    color: #c9a96e;
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 32px;
    cursor: pointer;
    transition: all 0.3s;
  }
  #intro .start-btn:hover {
    background: #c9a96e;
    color: #0a0a0a;
  }
  #intro .keys-note {
    font-size: 11px;
    color: #444;
    margin-top: 16px;
  }

  /* Episode title flash */
  #ep-flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1500;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #ep-flash.show { opacity: 1; }
  #ep-flash .ep-num {
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    color: #c9a96e;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  #ep-flash .ep-title {
    font-family: 'EB Garamond', serif;
    font-size: 48px;
    font-weight: 700;
    color: #fff;
    margin-top: 4px;
  }

  /* Progress bar at very top */
  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: #c9a96e;
    z-index: 1001;
    transition: width 0.5s ease;
  }

  /* ===== CALENDAR WIDGET ===== */
  #calendar {
    position: fixed;
    bottom: 180px;
    left: 24px;
    z-index: 1001;
    width: 100px;
    height: 110px;
    perspective: 600px;
  }
  .cal-base {
    width: 100px;
    height: 110px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .cal-rings {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 12px;
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    z-index: 3;
  }
  .cal-ring {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    border: 1.5px solid #555;
  }
  .cal-month-bar {
    position: absolute;
    top: 12px; left: 0; right: 0;
    height: 22px;
    background: #8b2020;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cal-month-text {
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .cal-body {
    position: absolute;
    top: 34px; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2px;
  }
  .cal-year {
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 11px;
    color: #666;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .cal-day {
    font-family: 'EB Garamond', serif;
    font-size: 38px;
    font-weight: 700;
    color: #e8e4dc;
    line-height: 1;
  }
  .cal-dow {
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 8px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 1px;
  }

  /* Flying pages */
  .cal-page-fly {
    position: absolute;
    top: 0; left: 0;
    width: 100px;
    height: 110px;
    border-radius: 6px;
    overflow: hidden;
    pointer-events: none;
    z-index: 4;
    transform-origin: top center;
  }
  .cal-page-fly .pfm {
    position: absolute;
    top: 12px; left: 0; right: 0;
    height: 22px;
    background: #8b2020;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cal-page-fly .pfm span {
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .cal-page-fly .pfb {
    position: absolute;
    top: 34px; left: 0; right: 0; bottom: 0;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .cal-page-fly .pfb .pfy {
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 11px;
    color: #666;
    letter-spacing: 1px;
  }
  .cal-page-fly .pfb .pfd {
    font-family: 'EB Garamond', serif;
    font-size: 38px;
    font-weight: 700;
    color: #e8e4dc;
    line-height: 1;
  }

  @keyframes page-fly-1 {
    0% { transform: rotateX(0) translateY(0) scale(1); opacity: 1; }
    30% { transform: rotateX(-40deg) translateY(-10px) scale(1); opacity: 1; }
    100% { transform: rotateX(-120deg) translateY(-80px) translateX(30px) scale(0.6); opacity: 0; }
  }
  @keyframes page-fly-2 {
    0% { transform: rotateX(0) translateY(0) scale(1); opacity: 1; }
    25% { transform: rotateX(-35deg) translateY(-8px) scale(1); opacity: 1; }
    100% { transform: rotateX(-100deg) translateY(-90px) translateX(-20px) scale(0.5); opacity: 0; }
  }
  @keyframes page-fly-3 {
    0% { transform: rotateX(0) translateY(0) scale(1); opacity: 1; }
    20% { transform: rotateX(-50deg) translateY(-12px) scale(1); opacity: 1; }
    100% { transform: rotateX(-140deg) translateY(-70px) translateX(15px) scale(0.55); opacity: 0; }
  }

  /* ===== MINIMAP ===== */
  #minimap-container {
    position: fixed;
    top: 76px;
    right: 24px;
    z-index: 1001;
    width: 360px;
    height: 240px;
    border: 1px solid #333;
    border-radius: 4px;
    overflow: hidden;
    background: #111;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #minimap-container .mini-base-tiles {
    filter: brightness(0.35) saturate(0.3) contrast(1.4);
  }
  #minimap-container .mini-label-tiles {
    filter: brightness(2.5) saturate(0) contrast(2);
    opacity: 0.9;
  }
  #minimap-container .leaflet-control-zoom { display: none; }
  #minimap-container .leaflet-control-attribution { display: none !important; }
  .minimap-label {
    position: absolute;
    top: 4px;
    left: 6px;
    z-index: 1002;
    font-size: 8px;
    font-weight: 600;
    color: #555;
    letter-spacing: 1px;
    text-transform: uppercase;
    pointer-events: none;
  }
  .minimap-viewport {
    border: 1.5px solid #c9a96e;
    background: rgba(201,169,110,0.08);
    position: absolute;
    z-index: 1000;
    pointer-events: none;
    transition: all 0.8s ease;
  }
  /* Minimap marker override */
  .mini-marker {
    background: none !important;
    border: none !important;
  }
  .mini-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c9a96e;
  }

// Calculate distance in km between two lat/lng pairs (Haversine)
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Smarter zoom based on distance from previous stop
function getTargetZoom(stop, prevStop) {
  if (stop.country === 'USA') return 6;
  if (!prevStop) return 8;
  const dist = haversineKm(prevStop.lat, prevStop.lng, stop.lat, stop.lng);
  if (dist < 3) return 14;
  if (dist < 10) return 13;
  if (dist < 30) return 12;
  if (dist < 80) return 11;
  if (dist < 150) return 10;
  if (dist < 300) return 9;
  if (dist < 600) return 8;
  if (dist < 1200) return 7;
  return 5;
}

function getTransportSvg(mode) {
  return TRANSPORT_ICONS[mode] ? TRANSPORT_ICONS[mode].svg : TRANSPORT_ICONS['on_foot'].svg;
}

function getSegmentInfo(fromIdx, toIdx) {
  const prev = allStops[fromIdx];
  const curr = allStops[toIdx];
  const distKm = haversineKm(prev.lat, prev.lng, curr.lat, curr.lng);
  let distText;
  if (distKm < 1) distText = `${Math.round(distKm * 1000)} m`;
  else if (distKm < 100) distText = `${distKm.toFixed(1)} km`;
  else distText = `${Math.round(distKm).toLocaleString()} km`;

  const prevDate = new Date(prev.calYear, prev.calMonth, prev.calDay);
  const currDate = new Date(curr.calYear, curr.calMonth, curr.calDay);
  const diffDays = Math.round((currDate - prevDate) / (1000 * 60 * 60 * 24));
  let timeText;
  if (diffDays === 0) timeText = 'Same day';
  else if (diffDays === 1) timeText = '1 day';
  else if (diffDays < 30) timeText = `${diffDays} days`;
  else if (diffDays < 365) {
    const months = Math.round(diffDays / 30.44);
    timeText = months === 1 ? '~1 month' : `~${months} months`;
  } else {
    const years = (diffDays / 365.25).toFixed(1);
    timeText = years === '1.0' ? '~1 year' : `~${years} years`;
  }
  return { distText, timeText };
}

function tooltipHtml(distText, timeText) {
  return `<div class="transport-tooltip"><div class="tt-dist">${distText}</div><div class="tt-time">${timeText}</div></div>`;
}

function createTransportMarkerIcon(mode, extraClass, segInfo) {
  const svg = getTransportSvg(mode);
  const tt = segInfo ? tooltipHtml(segInfo.distText, segInfo.timeText) : '';
  const html = `<div class="transport-mover-inner ${extraClass || ''}">${tt}${svg}</div>`;
  return L.divIcon({
    className: 'transport-mover',
    html: html,
    iconSize: [140, 80],
    iconAnchor: [70, 60]
  });
}

function clearTransportMarker() {
  if (transportMarker) {
    map.removeLayer(transportMarker);
    transportMarker = null;
  }
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
  isAnimating = false;
}

function interpolate(from, to, t) {
  return [from[0] + (to[0] - from[0]) * t, from[1] + (to[1] - from[1]) * t];
}

function animateTransport(fromIdx, toIdx, targetZoom, callback) {
  const fromStop = allStops[fromIdx];
  const toStop = allStops[toIdx];
  const mode = toStop.transport;
  const from = [fromStop.lat, fromStop.lng];
  const to = [toStop.lat, toStop.lng];
  const segInfo = getSegmentInfo(fromIdx, toIdx);
  const distKm = haversineKm(from[0], from[1], to[0], to[1]);

  clearTransportMarker();
  isAnimating = true;

  // Pick a single zoom that shows the journey nicely - don't change zoom during animation
  // Use a zoom that fits both points with padding, but not lower than 4
  const bounds = L.latLngBounds([from, to]);
  const travelZoom = Math.max(map.getBoundsZoom(bounds.pad(0.6)), 4);

  // Duration scales with distance
  const baseDurations = { on_foot: 2500, truck: 2000, ship: 3200, airplane: 1800, parachute: 1800, jeep: 2000 };
  const base = baseDurations[mode] || 2200;
  const distScale = 0.7 + Math.min(distKm / 400, 1) * 0.8;
  const duration = Math.round(base * distScale);

  // Phase 1: Zoom out to show both points (if needed), centered on midpoint
  const midLat = (from[0] + to[0]) / 2;
  const midLng = (from[1] + to[1]) / 2;
  const currentZoom = map.getZoom();

  // Only zoom out if the travel zoom is significantly different
  const needsZoomOut = travelZoom < currentZoom - 1;
  const zoomOutDuration = needsZoomOut ? 600 : 0;

  if (needsZoomOut) {
    map.setView([midLat, midLng], travelZoom, { animate: true, duration: 0.5 });
  }

  // Phase 2: After zoom-out settles, start the icon animation
  setTimeout(() => {
    // Create the transport icon with tooltip
    const icon = createTransportMarkerIcon(mode, `moving-${mode}`, segInfo);
    transportMarker = L.marker(from, { icon, zIndexOffset: 2000 }).addTo(map);

    // Flip SVG if going west
    const dx = to[1] - from[1];
    requestAnimationFrame(() => {
      const el = transportMarker.getElement();
      if (el && dx < 0) {
        const svg = el.querySelector('.transport-mover-inner svg');
        if (svg) svg.style.transform = 'scaleX(-1)';
      }
    });

    const startTime = performance.now();
    function step(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      const pos = interpolate(from, to, eased);

      // Move the icon
      transportMarker.setLatLng(pos);

      // Pan map to follow icon - keep zoom constant (no tile reloads!)
      map.panTo(pos, { animate: false });

      if (t < 1) {
        animationId = requestAnimationFrame(step);
      } else {
        // Phase 3: Zoom into destination
        map.flyTo(to, targetZoom, { duration: 0.8, easeLinearity: 0.25 });

        if (mode === 'parachute') {
          map.removeLayer(transportMarker);
          const paraIcon = createTransportMarkerIcon('parachute', 'anim-parachute', segInfo);
          transportMarker = L.marker(to, { icon: paraIcon, zIndexOffset: 2000 }).addTo(map);
          setTimeout(() => {
            isAnimating = false;
            if (callback) callback();
          }, 1500);
        } else {
          isAnimating = false;
          if (callback) callback();
        }
      }
    }
    animationId = requestAnimationFrame(step);
  }, zoomOutDuration);
}

// Preload tiles around a lat/lng at given zoom + nearby zooms
function preloadTilesAround(lat, lng, zoom) {
  const servers = ['a', 'b', 'c'];
  const baseUrls = [
    'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}.png',
    'https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}.png'
  ];

  // Preload at the target zoom and one level out
  const zooms = [zoom, Math.max(zoom - 1, 3), Math.max(zoom - 2, 3)];
  zooms.forEach(z => {
    const n = Math.pow(2, z);
    const x = Math.floor((lng + 180) / 360 * n);
    const latRad = lat * Math.PI / 180;
    const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
    // 5x5 grid around center tile
    const range = z === zoom ? 2 : 1;
    for (let ddx = -range; ddx <= range; ddx++) {
      for (let ddy = -range; ddy <= range; ddy++) {
        baseUrls.forEach(url => {
          const img = new Image();
          const s = servers[(ddx + ddy + 10) % 3];
          img.src = url.replace('{s}', s).replace('{z}', z).replace('{x}', x + ddx).replace('{y}', y + ddy);
        });
      }
    }
  });
}

// Preload the midpoint tiles for a journey between two stops
function preloadJourneyTiles(fromStop, toStop, targetZoom) {
  // Preload tiles along the route at the travel zoom
  const bounds = L.latLngBounds([[fromStop.lat, fromStop.lng], [toStop.lat, toStop.lng]]);
  const travelZoom = Math.max(map.getBoundsZoom(bounds.pad(0.6)), 4);
  const midLat = (fromStop.lat + toStop.lat) / 2;
  const midLng = (fromStop.lng + toStop.lng) / 2;
  preloadTilesAround(midLat, midLng, travelZoom);
  preloadTilesAround(fromStop.lat, fromStop.lng, travelZoom);
  preloadTilesAround(toStop.lat, toStop.lng, travelZoom);
  preloadTilesAround(toStop.lat, toStop.lng, targetZoom);
}

function goTo(index, skipAnimation) {
  if (index < 0 || index >= allStops.length) return;
  if (isAnimating) {
    clearTransportMarker();
  }

  const prev = currentIndex;
  currentIndex = index;

  const isAdjacentStep = Math.abs(index - prev) === 1 && !skipAnimation && prev >= 0;

  if (isAdjacentStep) {
    const stop = allStops[currentIndex];
    const prevStop = prev >= 0 ? allStops[prev] : null;
    const targetZoom = getTargetZoom(stop, prevStop);

    // Stop any ongoing Leaflet animations
    map.stop();

    // Preload tiles for the current journey BEFORE starting animation
    preloadJourneyTiles(prevStop, stop, targetZoom);

    // Animate transport - map follows the icon, always centered
    animateTransport(prev, currentIndex, targetZoom, () => {
      setTimeout(() => clearTransportMarker(), 1500);
    });

    // Update panel and other UI immediately
    renderUI();

    // Preload tiles for the next 2 stops (for when the user presses arrow again)
    for (let i = 1; i <= 2; i++) {
      const nextIdx = currentIndex + i;
      if (nextIdx < allStops.length) {
        const ns = allStops[nextIdx];
        const nz = getTargetZoom(ns, stop);
        preloadJourneyTiles(stop, ns, nz);
      }
      const prevIdx = currentIndex - i;
      if (prevIdx >= 0) {
        const ps = allStops[prevIdx];
        const pz = getTargetZoom(ps, stop);
        preloadJourneyTiles(stop, ps, pz);
      }
    }
  } else {
    clearTransportMarker();
    render();

    // Preload tiles for adjacent stops in both directions
    for (let i = -2; i <= 2; i++) {
      const nextIdx = currentIndex + i;
      if (nextIdx >= 0 && nextIdx < allStops.length && nextIdx !== currentIndex) {
        const ns = allStops[nextIdx];
        const nz = getTargetZoom(ns, allStops[currentIndex]);
        preloadTilesAround(ns.lat, ns.lng, nz);
        // Also preload the journey between current and next
        preloadJourneyTiles(allStops[currentIndex], ns, nz);
      }
    }
  }

  previousIndex = index;
}

function goToEpisode(ep) {
  const idx = allStops.findIndex(s => s.episode === ep);
  if (idx >= 0) {
    flashEpisode(ep);
    goTo(idx, true);
  }
}

function flashEpisode(ep) {
  const epData = DATA.episodes[ep - 1];
  const flash = document.getElementById('ep-flash');
  flash.querySelector('.ep-num').textContent = `Episode ${ep}`;
  flash.querySelector('.ep-title').textContent = `"${epData.title}"`;
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 1500);
}

function next() { goTo(currentIndex + 1); }
function prev() { goTo(currentIndex - 1); }

// Full render (map pan + UI) - used for jumps (episode click, first load)
function render() {
  const stop = allStops[currentIndex];
  const prevStop = currentIndex > 0 ? allStops[currentIndex - 1] : null;
  const targetZoom = getTargetZoom(stop, prevStop);
  map.flyTo([stop.lat, stop.lng], targetZoom, { duration: 2.5, easeLinearity: 0.15 });
  renderUI();
}

// UI-only render (markers, panel, dots) - used when goTo handles map pan + animation
function renderUI() {
  const stop = allStops[currentIndex];

  // Update markers
  allStops.forEach((s, i) => {
    const el = document.createElement('div');
    if (i < currentIndex) el.className = 'marker-dot visited';
    else if (i === currentIndex) el.className = 'marker-dot active';
    else el.className = 'marker-dot future';
    const icon = L.divIcon({ className: 'custom-marker', html: el.outerHTML, iconSize: [i === currentIndex ? 20 : 14, i === currentIndex ? 20 : 14], iconAnchor: [i === currentIndex ? 10 : 7, i === currentIndex ? 10 : 7] });
    markers[i].setIcon(icon);
  });

  // Update active route line
  const activeCoords = allStops.slice(0, currentIndex + 1).map(s => [s.lat, s.lng]);
  activeRouteLine.setLatLngs(activeCoords);

  // Update episode dots
  for (let i = 1; i <= 10; i++) {
    const dot = document.getElementById(`ep-dot-${i}`);
    const epStopsForDot = allStops.filter(s => s.episode === i);
    const firstIdx = allStops.indexOf(epStopsForDot[0]);
    const lastIdx = allStops.indexOf(epStopsForDot[epStopsForDot.length - 1]);
    dot.className = 'ep-dot';
    if (currentIndex >= firstIdx && currentIndex <= lastIdx) dot.classList.add('active');
    else if (currentIndex > lastIdx) dot.classList.add('visited');
  }

  // Progress bar
  const pct = ((currentIndex + 1) / allStops.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';

  // Nav counter
  document.getElementById('nav-counter').textContent = `${currentIndex + 1} / ${allStops.length}`;
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === allStops.length - 1;

  // Panel content
  const panel = document.getElementById('panel-inner');

  const epStops = allStops.filter(s => s.episode === stop.episode);
  const subDots = epStops.map((s, i) => {
    const globalIdx = allStops.indexOf(s);
    return `<div class="sub-dot ${globalIdx === currentIndex ? 'active' : ''}" onclick="goTo(${globalIdx})"></div>`;
  }).join('');

  let html = `
    <div class="episode-badge">Episode ${stop.episode}: "${stop.epTitle}" &middot; ${stop.epTime}</div>
    <div class="sub-nav">${subDots}</div>
    <div class="location-header">
      <div class="location-number">${String(currentIndex + 1).padStart(2, '0')}</div>
      <div>
        <div class="location-title">${stop.name}</div>
        <div class="date-badge">${stop.dates} &middot; ${stop.country}</div>
      </div>
    </div>
    <div class="transport-badge">
      ${TRANSPORT_ICONS[stop.transport].svg}
      <span class="transport-label">${TRANSPORT_ICONS[stop.transport].label}</span>
    </div>
  `;

  if (currentIndex === allStops.indexOf(epStops[0])) {
    html += `<div class="location-summary">${stop.epSummary}</div>`;
  }

  html += '<ul class="events-list">';
  stop.events.forEach(e => { html += `<li>${e}</li>`; });
  html += '</ul>';

  if (stop.note) {
    html += `<div class="historical-note"><strong>Historical note:</strong> ${stop.note}</div>`;
  }

  if (stop.characters && stop.characters.length > 0) {
    html += '<div class="characters-section"><h4>Key Figures</h4>';
    stop.characters.forEach(c => { html += `<span class="character-tag">${c}</span>`; });
    html += '</div>';
  }

  if (stop.landmarks && stop.landmarks.length > 0) {
    html += '<div class="landmarks-section"><h4>Visit Today</h4>';
    stop.landmarks.forEach(l => { html += `<div class="landmark-item"><span class="lm-name">${l.name}</span> - ${l.desc}</div>`; });
    html += '</div>';
  }

  if (stop.wiki) {
    html += `<a class="wiki-link" href="${stop.wiki}" target="_blank" rel="noopener">Read more on Wikipedia &rarr;</a>`;
  }

  panel.innerHTML = html;
  panel.scrollTop = 0;

  // ===== UPDATE CALENDAR =====
  updateCalendar(stop);

  // ===== UPDATE MINIMAP =====
  updateMinimap();
}

// Calendar state
let lastCalMonth = -1;
let lastCalYear = -1;

function updateCalendar(stop) {
  const m = stop.calMonth;
  const d = stop.calDay;
  const y = stop.calYear;

  // Calculate months elapsed since previous stop for page-fly count
  const prevStop = currentIndex > 0 ? allStops[currentIndex - 1] : null;
  let monthsElapsed = 0;
  if (prevStop) {
    monthsElapsed = (y * 12 + m) - (prevStop.calYear * 12 + prevStop.calMonth);
  }

  // Cap flying pages to avoid overwhelming the screen
  const flyCount = Math.min(Math.max(monthsElapsed, 0), 12);

  // Spawn flying pages before updating the static calendar
  if (flyCount > 0 && prevStop) {
    spawnFlyingPages(prevStop, flyCount);
  }

  // Update static calendar (with slight delay so pages fly first)
  const delay = flyCount > 0 ? 300 : 0;
  setTimeout(() => {
    document.getElementById('cal-month').textContent = MONTH_NAMES[m];
    document.getElementById('cal-year').textContent = y;
    document.getElementById('cal-day').textContent = d;

    // Day of week (approximate)
    try {
      const dt = new Date(y, m, d);
      document.getElementById('cal-dow').textContent = DOW_NAMES[dt.getDay()];
    } catch(e) {
      document.getElementById('cal-dow').textContent = '';
    }

    // Color the month bar seasonally
    const bar = document.querySelector('.cal-month-bar');
    if (m >= 11 || m <= 1) bar.style.background = '#2c4a6e'; // winter blue
    else if (m >= 2 && m <= 4) bar.style.background = '#3d6b3d'; // spring green
    else if (m >= 5 && m <= 7) bar.style.background = '#8b2020'; // summer red
    else bar.style.background = '#8b6914'; // autumn gold
  }, delay);

  lastCalMonth = m;
  lastCalYear = y;
}

function spawnFlyingPages(prevStop, count) {
  const cal = document.getElementById('calendar');
  const animations = ['page-fly-1', 'page-fly-2', 'page-fly-3'];

  // Generate intermediate months
  let startM = prevStop.calMonth;
  let startY = prevStop.calYear;

  for (let i = 0; i < count; i++) {
    const pm = (startM + i) % 12;
    const py = startY + Math.floor((startM + i) / 12);

    const page = document.createElement('div');
    page.className = 'cal-page-fly';
    page.style.background = '#1a1a1a';

    // Season color
    let barColor;
    if (pm >= 11 || pm <= 1) barColor = '#2c4a6e';
    else if (pm >= 2 && pm <= 4) barColor = '#3d6b3d';
    else if (pm >= 5 && pm <= 7) barColor = '#8b2020';
    else barColor = '#8b6914';

    page.innerHTML = `
      <div class="pfm" style="background:${barColor}"><span>${MONTH_NAMES[pm]}</span></div>
      <div class="pfb"><div class="pfy">${py}</div><div class="pfd">&mdash;</div></div>
    `;

    const anim = animations[i % animations.length];
    const stagger = i * (count > 6 ? 80 : 150);
    page.style.animation = `${anim} 0.9s ease-out ${stagger}ms forwards`;

    cal.appendChild(page);

    // Clean up after animation
    setTimeout(() => {
      if (page.parentNode) page.parentNode.removeChild(page);
    }, stagger + 1000);
  }
}

function updateMinimap() {
  if (!minimap) return;

  // Update minimap markers
  allStops.forEach((s, i) => {
    const isActive = i === currentIndex;
    const dotHtml = `<div class="mini-dot ${isActive ? 'mini-active' : ''}"></div>`;
    const size = isActive ? 7 : 5;
    const icon = L.divIcon({ className: 'mini-marker', html: dotHtml, iconSize: [size, size], iconAnchor: [Math.floor(size/2), Math.floor(size/2)] });
    minimapMarkers[i].setIcon(icon);
  });

  // Update active route on minimap
  const activeCoords = allStops.slice(0, currentIndex + 1).map(s => [s.lat, s.lng]);
  minimapActiveRoute.setLatLngs(activeCoords);

  // Center minimap directly on current stop
  const stop = allStops[currentIndex];
  const lat = stop.lat;
  const lng = stop.lng;

  // Zoom out enough to always see country borders for context
  let mZoom;
  if (stop.country === 'USA') {
    mZoom = 4;
  } else {
    mZoom = 5; // always show country-level context in Europe
  }

  // Use setView (not flyTo) for reliability, with invalidateSize to force layout
  minimap.invalidateSize();
  minimap.setView([lat, lng], mZoom, { animate: true, duration: 0.8 });
}

function startMap() {
  document.getElementById('intro').classList.add('hidden');
  setTimeout(() => document.getElementById('intro').style.display = 'none', 1000);
  flashEpisode(1);
  goTo(0, true);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (document.getElementById('intro').style.display !== 'none' && !document.getElementById('intro').classList.contains('hidden')) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startMap(); }
    return;
  }
  if (e.key === 'ArrowRight' || e.key === 'l' || e.key === 'j') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft' || e.key === 'h' || e.key === 'k') { e.preventDefault(); prev(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); prev(); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); next(); }
  else if (e.key >= '1' && e.key <= '9') { goToEpisode(parseInt(e.key)); }
  else if (e.key === '0') { goToEpisode(10); }
});

// Touch swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 50) {
    if (diff < 0) next();
    else prev();
  }
});

// Init
initMap();

// Preload tiles for the first 5 stops while user reads the intro screen
setTimeout(() => {
  for (let i = 0; i < Math.min(5, allStops.length); i++) {
    const s = allStops[i];
    const z = s.country === 'USA' ? 6 : 9;
    preloadTilesAround(s.lat, s.lng, z);
    if (i > 0) {
      preloadJourneyTiles(allStops[i-1], s, z);
    }
  }
}, 500);
</script>
